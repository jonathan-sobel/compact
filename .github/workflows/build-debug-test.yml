name: Debugging project build

on:
  workflow_dispatch:
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  debug-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout compactc repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nix with cache
        uses: ./.github/actions/setup-nix-cache
        with:
          attic_token: ${{ secrets.ATTIC_CACHE_TOKEN }}

      - name: Build lib
        run: |
          nix build .#runtime.forPublish

      - name: Setup .npmrc
        run: |
          cd ./debug-test
          echo "
          //npm.pkg.github.com/:_authToken=${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          @midnight-ntwrk:registry=https://npm.pkg.github.com/
          " > .npmrc

      - name: Install dependencies
        run: |
          cd ./debug-test
          yarn install

      - name: Compile contract
        run: |
          cd ./debug-test
          nix develop .#compiler --command compactc src/contract.compact gen

      - name: Build and test
        run: |
          cd ./debug-test
          yarn build
          yarn test
