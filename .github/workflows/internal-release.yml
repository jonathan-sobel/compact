# NB: if this name changes, it must also be changed in notify-failed-scheduled
name: Internal release of compact toolchain

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Toolchain version (e.g. v1.2.3-rc.1, v1.2.3-alpha.0)'
        required: true
        type: string
      branch:
        description: 'Branch to use for release'
        required: true
        type: choice
        default: 'release/midnight'
        options:
          - main
          - release/midnight
      include_macos_intel:
        description: 'Include MacOS Intel build'
        required: true
        type: boolean
        default: true
      include_release_notes:
        description: 'Include release notes in artifact zip files'
        required: true
        type: boolean
        default: true
      docs:
        description: 'Create branch with documentation in midnight-docs'
        required: true
        type: boolean
        default: true
      docs_branch:
        description: 'Branch to merge with in midnight-docs'
        required: true
        type: string
        default: 'main'
      pr_description:
        description: 'Draft PR description for docs'
        required: true
        type: string
        default: 'Compact toolchain docs copied to midnight-docs'

  schedule:
    - cron: '0 */12 * * *'

permissions: {}

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup the variables
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set_branch.outputs.branch }}
      clean_tag: ${{ steps.clean.outputs.tag }}
      linux_arm: ${{ steps.linux_arm.outputs.name }}
      linux_x86: ${{ steps.linux_x86.outputs.name }}
      macos_arm: ${{ steps.macos_arm.outputs.name }}
      macos_x86: ${{ steps.macos_x86.outputs.name }}
      release_notes_file: ${{ steps.release_notes.outputs.file }}
      release_notes_flag: ${{ steps.release_notes_flag.outputs.include }}
    steps:
      - name: Determine branch
        id: set_branch
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          if [ -z "$BRANCH" ]; then
            BRANCH="main"
          fi
          echo "Using branch: $BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Sanitize tag
        id: clean
        env:
          RAW_REF: ${{ inputs.version || github.ref_name }}
        run: |
          # Remove slashes in the branch name, otherwise they would be interpreted as subdirectories
          # in the build step
          SAFE_REF_NAME="$(echo "$RAW_REF" | sed 's;/;_;g')"
          echo "tag=$SAFE_REF_NAME" >> $GITHUB_OUTPUT

      - name: Set linux arm name
        id: linux_arm
        run: echo "name=aarch64-unknown-linux-musl" >> "$GITHUB_OUTPUT"

      - name: Set linux x86 name
        id: linux_x86
        run: echo "name=x86_64-unknown-linux-musl" >> "$GITHUB_OUTPUT"

      - name: Set macos arm name
        id: macos_arm
        run: echo "name=aarch64-darwin" >> "$GITHUB_OUTPUT"

      - name: Set macos x86 name
        id: macos_x86
        run: echo "name=x86_64-darwin" >> "$GITHUB_OUTPUT"

      - name: Compute release notes path
        id: release_notes
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION" ]; then
            # Extract just the major.minor.patch part (strip leading 'v' and any suffix like -rc.0)
            CLEAN_VERSION=$(echo "$VERSION" | sed 's/^v//' | sed 's/-.*//')
            echo "file=doc/release-notes/toolchain-${CLEAN_VERSION}.md" >> "$GITHUB_OUTPUT"
          else
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set release notes include flag
        id: release_notes_flag
        env:
          INCLUDE_NOTES: ${{ inputs.include_release_notes }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$INCLUDE_NOTES" = "true" ] && [ "$EVENT_NAME" != "schedule" ]; then
            echo "include=true" >> "$GITHUB_OUTPUT"
          else
            echo "include=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check format of internal release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          INTERNAL: ${{ inputs.version }}
        run: |
          if [[ ! "$INTERNAL" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.+$ ]]; then
            echo "::error::version must match v*.*.*-* format (e.g. v1.2.3-rc.1), got: $INTERNAL"
            exit 1
          fi
          echo "Internal version format is valid: $INTERNAL"

  check-release-notes-exist:
    name: Check if release notes file exists
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [ setup ]
    steps:
      - name: Checkout compactc repository
        if: ${{ inputs.include_release_notes && github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.branch }}

      - name: Verify release notes file exists
        if: ${{ inputs.include_release_notes && github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_NOTES_FILE: ${{ needs.setup.outputs.release_notes_file }}
          BRANCH: ${{ needs.setup.outputs.branch }}
        run: |
          if [ ! -f "$RELEASE_NOTES_FILE" ]; then
            echo "::error::Release notes file '$RELEASE_NOTES_FILE' not found on branch '$BRANCH'"
            exit 1
          fi
          echo "Release notes file found: $RELEASE_NOTES_FILE"

  check-docs:
    name: Check if documentation is updated
    if: ${{ inputs.docs && github.event_name == 'workflow_dispatch' }}
    needs: [ setup ]
    permissions:
      contents: read
    uses: ./.github/workflows/check-docs.yml
    secrets: inherit
    with:
      branch: ${{ needs.setup.outputs.branch }}

  build-release-arm-linux:
    name: Build compactc binary for Linux aarch64 (Arm)
    uses: ./.github/workflows/release-build.yml
    needs: [ setup, check-release-notes-exist ]
    permissions:
      contents: read
    secrets: inherit
    with:
      tag: ${{ needs.setup.outputs.clean_tag }}
      branch: ${{ needs.setup.outputs.branch }}
      artifact: linux-release-aarch64
      platform: ubuntu-24.04-arm
      architecture: ${{ needs.setup.outputs.linux_arm }}
      buildCommand: nix build .\#compactc-binary -L
      include_release_notes: ${{ needs.setup.outputs.release_notes_flag == 'true' }}
      release_notes_file: ${{ needs.setup.outputs.release_notes_file }}
      skipCache: false

  build-release-intel-linux:
    name: Build compactc binary for Linux x86_64 (Intel)
    uses: ./.github/workflows/release-build.yml
    needs: [ setup, check-release-notes-exist ]
    permissions:
      contents: read
    secrets: inherit
    with:
      tag: ${{ needs.setup.outputs.clean_tag }}
      branch: ${{ needs.setup.outputs.branch }}
      artifact: linux-release-x86_64
      platform: ubuntu-latest
      architecture: ${{ needs.setup.outputs.linux_x86 }}
      buildCommand: nix build .\#compactc-binary -L
      include_release_notes: ${{ needs.setup.outputs.release_notes_flag == 'true' }}
      release_notes_file: ${{ needs.setup.outputs.release_notes_file }}
      skipCache: false

  build-release-arm-macos:
    name: Build compactc binary for macOS aarch64 (Arm)
    uses: ./.github/workflows/release-build.yml
    needs: [ setup, check-release-notes-exist ]
    permissions:
      contents: read
    secrets: inherit
    with:
      tag: ${{ needs.setup.outputs.clean_tag }}
      branch: ${{ needs.setup.outputs.branch }}
      artifact: macos-release-aarch64
      platform: macos-latest-xlarge
      architecture: ${{ needs.setup.outputs.macos_arm }}
      buildCommand: nix build .\#compactc-binary -L
      include_release_notes: ${{ needs.setup.outputs.release_notes_flag == 'true' }}
      release_notes_file: ${{ needs.setup.outputs.release_notes_file }}
      skipCache: false

  build-release-intel-macos:
    name: Build compactc binary for macOS x86_64 (Intel)
    uses: ./.github/workflows/release-build.yml
    needs: [ setup, check-release-notes-exist ]
    permissions:
      contents: read
    if: ${{ inputs.include_macos_intel && github.event_name != 'schedule' }}
    secrets: inherit
    with:
      tag: ${{ needs.setup.outputs.clean_tag }}
      branch: ${{ needs.setup.outputs.branch }}
      artifact: macos-release-x86_64
      platform: macos-15-intel
      architecture: ${{ needs.setup.outputs.macos_x86 }}
      buildCommand: nix build .\#compactc-binary -L
      include_release_notes: ${{ needs.setup.outputs.release_notes_flag == 'true' }}
      release_notes_file: ${{ needs.setup.outputs.release_notes_file }}
      skipCache: true

  test-arm-linux:
    name: Test compactc on Linux aarch64 (Arm)
    uses: ./.github/workflows/release-test.yml
    needs: [ setup, build-release-arm-linux ]
    permissions:
      contents: read
    secrets: inherit
    with:
      tag: ${{ needs.setup.outputs.clean_tag }}
      branch: ${{ needs.setup.outputs.branch }}
      artifact: linux-release-aarch64
      platform: ubuntu-24.04-arm
      architecture: ${{ needs.setup.outputs.linux_arm }}

  test-intel-linux:
    name: Test compactc on Linux x86_64 (Intel)
    uses: ./.github/workflows/release-test.yml
    needs: [ setup, build-release-intel-linux ]
    permissions:
      contents: read
    secrets: inherit
    with:
      tag: ${{ needs.setup.outputs.clean_tag }}
      branch: ${{ needs.setup.outputs.branch }}
      artifact: linux-release-x86_64
      platform: ubuntu-latest
      architecture: ${{ needs.setup.outputs.linux_x86 }}

  test-arm-macos:
    name: Test compactc on macOS aarch64 (Arm)
    uses: ./.github/workflows/release-test.yml
    needs: [ setup, build-release-arm-macos ]
    permissions:
      contents: read
    secrets: inherit
    with:
      tag: ${{ needs.setup.outputs.clean_tag }}
      branch: ${{ needs.setup.outputs.branch }}
      artifact: macos-release-aarch64
      platform: macos-latest-xlarge
      architecture: ${{ needs.setup.outputs.macos_arm }}

  test-intel-macos:
    name: Test compactc on macOS x86_64 (Intel)
    uses: ./.github/workflows/release-test.yml
    needs: [ setup, build-release-intel-macos ]
    permissions:
      contents: read
    secrets: inherit
    with:
      tag: ${{ needs.setup.outputs.clean_tag }}
      branch: ${{ needs.setup.outputs.branch }}
      artifact: macos-release-x86_64
      platform: macos-15-intel
      architecture: ${{ needs.setup.outputs.macos_x86 }}

  make-release:
    name: Create GitHub release associated with tag
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [ setup, test-arm-linux, test-intel-linux, test-arm-macos, test-intel-macos ]
    steps:
      - name: Verify required builds passed
        env:
          RESULT_ARM_LINUX: ${{ needs.test-arm-linux.result }}
          RESULT_INTEL_LINUX: ${{ needs.test-intel-linux.result }}
          RESULT_ARM_MACOS: ${{ needs.test-arm-macos.result }}
          RESULT_INTEL_MACOS: ${{ needs.test-intel-macos.result }}
        run: |
          if [ "$RESULT_ARM_LINUX" != "success" ] || \
             [ "$RESULT_INTEL_LINUX" != "success" ] || \
             [ "$RESULT_ARM_MACOS" != "success" ]; then
            echo "::error::One or more required builds/tests failed."
            exit 1
          fi
          if [ "$RESULT_INTEL_MACOS" != "success" ] && \
             [ "$RESULT_INTEL_MACOS" != "skipped" ]; then
            echo "::error::Intel macOS build/test failed."
            exit 1
          fi
          echo "All required builds and tests passed."

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.branch }}

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Fetch release assets - Linux aarch64 (Arm)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-release-aarch64

      - name: Fetch release assets - Linux x86_64 (Intel)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-release-x86_64

      - name: Fetch release assets - Macos aarch64 (Arm)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-release-aarch64

      - name: Fetch release assets - Macos x86_64 (Intel)
        if: ${{ needs.test-intel-macos.result == 'success' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-release-x86_64

      - name: Patch release notes in zip artifacts
        env:
          VERSION: ${{ inputs.version }}
          CLEAN_TAG: ${{ needs.setup.outputs.clean_tag }}
          RELEASE_NOTES_FILE: ${{ needs.setup.outputs.release_notes_file }}
        run: |
          CLEAN_VERSION="${VERSION#v}"
          NOTES_FILENAME=$(basename "$RELEASE_NOTES_FILE")
          TARGET_FILENAME="toolchain-${CLEAN_VERSION}.md"

          for zip in compactc_"${CLEAN_TAG}"_*.zip; do
            echo "Patching $zip..."

            # Find the full path of the release notes file inside the zip
            # (it may be nested, e.g. aarch64-darwin/toolchain-0.30.0.md)
            NOTES_PATH_IN_ZIP=$(unzip -Z1 "$zip" | grep -E "(^|/)${NOTES_FILENAME}$")

            if [ -z "$NOTES_PATH_IN_ZIP" ]; then
              echo "::warning::Release notes file '$NOTES_FILENAME' not found in $zip, skipping."
              continue
            fi

            echo "Found in zip at: $NOTES_PATH_IN_ZIP"

            # Build the new path: same parent directory, renamed file
            PARENT_DIR=$(dirname "$NOTES_PATH_IN_ZIP")
            if [ "$PARENT_DIR" = "." ]; then
              TARGET_PATH_IN_ZIP="$TARGET_FILENAME"
            else
              TARGET_PATH_IN_ZIP="$PARENT_DIR/$TARGET_FILENAME"
            fi

            # Extract to a temp file, patch the title
            unzip -p "$zip" "$NOTES_PATH_IN_ZIP" > /tmp/patched_notes.md
            sed -i "s/^# Compact toolchain .*/# Compact toolchain ${CLEAN_VERSION}/" /tmp/patched_notes.md

            # Remove the old entry from the zip
            zip --delete "$zip" "$NOTES_PATH_IN_ZIP"

            # Re-add the patched file with the new name
            mkdir -p "/tmp/zip_stage/$(dirname "$TARGET_PATH_IN_ZIP")"
            cp /tmp/patched_notes.md "/tmp/zip_stage/$TARGET_PATH_IN_ZIP"
            cd /tmp/zip_stage
            zip "$GITHUB_WORKSPACE/$zip" "$TARGET_PATH_IN_ZIP"
            cd "$GITHUB_WORKSPACE"
            rm -rf /tmp/zip_stage
          done

      - name: Patch release notes file for GitHub release body
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_NOTES_FILE: ${{ needs.setup.outputs.release_notes_file }}
        run: |
          CLEAN_VERSION="${VERSION#v}"
          sed -i "s/^# Compact toolchain .*/# Compact toolchain ${CLEAN_VERSION}/" "$RELEASE_NOTES_FILE"

      - name: Create Release on midnight-ntwrk/artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          repository: midnight-ntwrk/artifacts
          tag_name: compactc-${{ inputs.version || github.ref_name }}
          name: Compact toolchain ${{ inputs.version || github.ref_name }}
          draft: false
          prerelease: false
          files: compactc_${{ needs.setup.outputs.clean_tag }}_*.zip
          token: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          body_path: ${{ needs.setup.outputs.release_notes_flag == 'true' && needs.setup.outputs.release_notes_file || '' }}
          body: ${{ needs.setup.outputs.release_notes_flag != 'true' && format('Compactc {0}', inputs.version || github.ref_name) || '' }}

      - name: Create Release on LFDT/Minokawa
        id: create_release_lfdt
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          repository: LFDT-Minokawa/compact
          tag_name: compactc-${{ inputs.version || github.ref_name }}
          target_commitish: ${{ needs.setup.outputs.branch }}
          name: Compact toolchain ${{ inputs.version || github.ref_name }}
          draft: true
          prerelease: true
          files: compactc_${{ needs.setup.outputs.clean_tag }}_*.zip
          token: ${{ secrets.MIDNIGHTCI_REPO }}
          body_path: ${{ needs.setup.outputs.release_notes_flag == 'true' && needs.setup.outputs.release_notes_file || '' }}
          body: ${{ needs.setup.outputs.release_notes_flag != 'true' && format('Compactc {0}', inputs.version || github.ref_name) || '' }}

      - name: Publish release on LFDT-Minokawa/compact
        env:
          GH_TOKEN: ${{ secrets.MIDNIGHTCI_REPO }}
          RELEASE_ID: ${{ steps.create_release_lfdt.outputs.id }}
        run: |
          gh api \
            --method PATCH \
            /repos/LFDT-Minokawa/compact/releases/${RELEASE_ID} \
            -f draft=false

  generate-docs-after-release:
    if: ${{ always() && inputs.docs && github.event_name == 'workflow_dispatch' && needs.make-release.result == 'success' }}
    name: Create branch in midnight-docs with latest documentation
    needs: [ setup, check-docs, make-release ]
    permissions:
      contents: read
    uses: ./.github/workflows/generate-docs.yml
    secrets: inherit
    with:
      branch: ${{ needs.setup.outputs.branch }}
      docs_branch: ${{ inputs.docs_branch }}
      pr_description: ${{ inputs.pr_description }}
      draft_pr: true

